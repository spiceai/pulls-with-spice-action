name: Enforce Pulls with Spice

on:
  pull_request:
    types:
      [labeled, unlabeled, opened, edited, synchronize, assigned, unassigned]
  merge_group:
    types: [checks_requested]

jobs:
  enforce-pull-with-spice:
    runs-on: spiceai-macos
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
      - uses: actions/setup-node@v6
        if: github.event_name == 'pull_request'
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
        if: github.event_name == 'pull_request'
      - run: npm run build
        if: github.event_name == 'pull_request'
      - uses: ./
        if: github.event_name == 'pull_request'
        with:
          require_title_min_length: '5'
          required_label_prefixes: 'kind/'
          banned_labels: 'invalid,wontfix,nomerge,duplicate'
          require_assignee: 'true'
          auto_label: 'true'
          auto_label_size: 'true'
          auto_label_type: 'true'
          # AI-powered auto-labeling with Spice Cloud
          spice_api_key: ${{ secrets.SCP_SPICEAI_PULLS_WITH_SPICE_API_KEY }}
          spice_cloud_region: 'us-east-1'
          ai_auto_label: 'true'
          ai_model: 'openai'
